name: Push 기반 CI/CD 테스트

# container 브랜치에서 push 이벤트(리슨 -> on)가 발생되면 아래 설정한 내용대로 작동함.
on: 
  push:
    branches: [ "comtainer" ]

jobs:
  # app관련 이미지를 생성해 허브에 push (소스코드/리소스 모두 포함되어 있음)
  ci: 
    runs-on: ubuntu-latest

    steps:
      # 체크아웃, 소스코드를 ci서버에 다운
      - name: 코드 checkout
        uses: actions/checkout@v3

      # Docker 허브 로그인 -> ID/PW 
      # Secret 변수로 DOCKER_USERNAME, DOCKER_PASSWORD 생성
      - name: Docker hub login
        uses: docker/login-action@v2
        with: 
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # fastapi-app 에 대한 이미지 빌드/push 동시진행
      - name: Build and Push fastapi app
        uses: docker/build-push-action@v4
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fastapi-app:1.0
  
  # CD: 배포1
  # EC2에 docker-compose/yml, 설정파일등 copy, docker-compose 작동
