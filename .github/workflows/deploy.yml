name: Push 기반 CI/CD 테스트

# container 브랜치에서 push 이벤트(리슨 -> on)가 발생되면 아래 설정한 내용대로 작동함.
on: 
  push:
    branches: [ "container" ]

jobs:
  # app관련 이미지를 생성해 허브에 push (소스코드/리소스 모두 포함되어 있음)
  ci: 
    runs-on: ubuntu-latest

    steps:
      # 체크아웃, 소스코드를 ci서버에 다운
      - name: 코드 checkout
        uses: actions/checkout@v3

      # Docker 허브 로그인 -> ID/PW 
      # Secret 변수로 DOCKER_USERNAME, DOCKER_PASSWORD 생성
      - name: Docker hub login
        uses: docker/login-action@v2
        with: 
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # fastapi-app 에 대한 이미지 빌드/push 동시진행
      - name: Build and Push fastapi app
        uses: docker/build-push-action@v4
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fastapi-app:1.1

      # nginx-proxy:1.0 형태로 이미지 빌드 -> 푸시
      - name: Build and Push fastapi app
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/nginx-proxy:1.0

  
  # CD: 배포
  # EC2에 docker-compose/yml, 설정파일등 copy
  # docker-compose SSH 명령어 실행
  cd:
    # CI 작업이 완료된 후 진행
    needs: ci
    # CD 작업을 위한 서버 세팅
    runs-on: ubuntu-latest
      
    steps:
      # 1. 소스코드 체크아웃
      - name: 코드 checkout
        uses: actions/checkout@3

      # 2. 카피 docker-compose.yml, .env(존재하면)  
      - name: sourcecode copy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          source: ./docker-compose.yml
          target: "/home/ubuntu"
      
      - name: Run Script And Service Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            # 작업 디렉토리 이동 (docker-compose.yml 존재하는 위치)
            cd /home/ubuntu
            # 필요시 .env 생성 -> 시크릿 변수 읽어 파일 처리(여기서는 생략)
            # 최신 이미지 가져오기
            docker-compose pull
            # 컨테이너 구성 -> 신규, 교체
            docker-compose up -d
            # 이미지가 최신으로 교체되면 기존것이 가비지가 되어 공간만 차지함
            docker image prune -f
            



    
          
      